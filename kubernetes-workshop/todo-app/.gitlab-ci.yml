stages:
  - build
  - deploy

build-backend:
  stage: build
  image: docker:20.10.7
  services:
    - docker:20.10.7-dind
  script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - docker build -t $CI_REGISTRY/workshop/todo-app-workshop17/backend:latest ./backend
    - docker push $CI_REGISTRY/workshop/todo-app-workshop17/backend:latest
  rules:
    - changes:
        - backend/**/*

build-frontend:
  stage: build
  image: docker:20.10.7
  services:
    - docker:20.10.7-dind
  script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - docker build -t $CI_REGISTRY/workshop/todo-app-workshop17/frontend:latest ./frontend
    - docker push $CI_REGISTRY/workshop/todo-app-workshop17/frontend:latest
  rules:
    - changes:
        - frontend/**/*

deploy-backend:
  stage: deploy
  image: alpine/helm:latest
  script:
    - helm upgrade --install backend ./infrastructure/charts/backend -n workshop17 --kubeconfig $KUBECONFIG
  rules:
    - changes:
        - backend/**/*
        - infrastructure/charts/backend/**/*

deploy-frontend:
  stage: deploy
  image: alpine/helm:latest
  script:
    - helm upgrade --install frontend ./infrastructure/charts/frontend -n workshop17 --kubeconfig $KUBECONFIG
  rules:
    - changes:
        - frontend/**/*
        - infrastructure/charts/frontend/**/*
