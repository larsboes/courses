<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Playlist Manager</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav-bar a {
            text-decoration: none;
            color: #4361ee;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-bar a:hover {
            background: #4895ef;
            color: white;
        }

        .nav-bar a.active {
            background: #4361ee;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="nav-bar">
            <a href="/" class="active">🎵 App</a>
            <a href="/explanation.html">📖 Explanation</a>
            <a href="/architecture.html">🏗️ Architecture</a>
            <a href="/openapi.html">📋 API Docs</a>
        </nav>

        <h1>Meta Playlist Manager</h1>

        <!-- Playlist Selection and Creation -->
        <div class="playlist-controls">
            <input type="text" id="playlist-name" placeholder="New Playlist Name" required>
            <button id="create-playlist">Create Playlist</button>
            <select id="playlist-select">
                <option value="" disabled selected>Select a Playlist</option>
            </select>
            <button id="delete-playlist">Delete Playlist</button>
        </div>

        <!-- Track Input Form -->
        <form id="track-form">
            <input type="text" id="title" placeholder="Track Title" required>
            <input type="url" id="link" placeholder="Track URL (Streaming Service Link)" required>
            <input type="text" id="duration" placeholder="Duration (mm:ss)">
            <button type="submit">Add Track</button>
        </form>

        <!-- Playlist Display -->
        <div class="playlist">
            <h2>Playlist Details</h2>
            <ul id="playlist"></ul>
            <div id="total-duration">Total Duration: 0:00</div>
            <button id="save-playlist">Save Playlist</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
