# Uebung 7-8: Meta Playlist UI (HTML/CSS/JS)
# Static frontend served by nginx
# Uses localStorage for persistence (client-side only)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meta-playlist-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      component: frontend
  template:
    metadata:
      labels:
        component: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - name: html-content
              mountPath: /usr/share/nginx/html
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: html-content
          configMap:
            name: meta-playlist-ui-files
