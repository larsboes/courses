services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: bun run dev
    depends_on:
      - backend

  backend:
    image: python:3.12-slim
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/app
      - ./data:/data
      - ~/.config/gcloud:/root/.config/gcloud:ro
    environment:
      # Direct API mode (Google AI Studio) - set GEMINI_API_KEY to enable
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3-flash-preview}
      # Vertex AI mode (Google Cloud) - used when GEMINI_API_KEY is not set
      - VERTEX_PROJECT_ID=${VERTEX_PROJECT_ID:-de0360-sbx-lars}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-europe-west4}
      - VERTEX_MODEL=${VERTEX_MODEL:-gemini-3-flash-preview}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=${NO_PROXY}
      - http_proxy=${HTTP_PROXY}
      - https_proxy=${HTTPS_PROXY}
      - no_proxy=${NO_PROXY}
    command: >
      bash -c "pip install uv -q && uv sync --frozen && uv run uvicorn exam_trainer_api.main:app --host 0.0.0.0 --port 8000 --reload"
