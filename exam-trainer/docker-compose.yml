services:
  exam-trainer:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/data:/app/data
      - ~/.config/gcloud:/root/.config/gcloud:ro
    environment:
      - VERTEX_PROJECT_ID=de0360-sbx-lars
      - VERTEX_LOCATION=europe-west4
      - VERTEX_MODEL=gemini-3-flash-preview
